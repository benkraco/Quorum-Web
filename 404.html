<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/Logos/Isotipo.jpg">
    <title>Página no encontrada | Quórum</title>
    <meta name="robots" content="noindex">
    <meta name="description" content="La página que intentás visitar no existe.">
</head>

<body class="pagina404">
    <header>
        <img src="img/Logos/IsotipoSinFondo.png" alt="Logo Quórum" class="logo">
        <h1>Quórum</h1>

        <nav>
        </nav>

        <div class="offcanva">
            <a class="btn btn-primary" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button"
                aria-controls="offcanvasExample">
                <img src="img/Iconos/menu-2.png" alt="">
            </a>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasExample"
                aria-labelledby="offcanvasExampleLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasExampleLabel">Menu</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="error404">
            <img src="img/Logos/IsotipoSinFondo.png" alt="Logo Quórum" class="error404Logo">

            <h1>Error 404</h1>

            <h2>
                Parece que esta juntada
                <span>no existe</span>
            </h2>

            <p>
                El enlace que intentaste abrir no fue encontrado.
                Puede que haya sido eliminado o que la dirección esté mal escrita.
            </p>

            <a href="/" class="botonWishlist">Volver al inicio</a>
        </section>
    </main>
</body>

</html>
